<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Library — Shelf</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="dashboard-page">
  <header class="dash-header">
    <div>
      <a href="/" class="dash-logo">Shelf</a>
      <p class="dash-subtitle">Your personal library</p>
    </div>
    <button type="button" class="btn btn-add" id="btn-add-item">+ Add Book</button>
  </header>

  <main class="dash-main">
    <div class="dash-controls">
      <div class="search-bar">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search by title, author, or genre..." />
      </div>
      <div class="format-filter" id="format-filter">
        <button type="button" class="format-filter-toggle" id="format-filter-toggle" aria-haspopup="listbox" aria-expanded="false">
          <span id="format-filter-label">All Formats</span>
          <svg class="format-filter-caret" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="format-filter-menu" id="format-filter-menu" role="listbox" hidden></div>
      </div>
    </div>

    <nav class="status-tabs" id="status-tabs">
      <button type="button" class="status-tab active" data-status="">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        All
        <span class="tab-count" id="summary-all">0</span>
      </button>
      <button type="button" class="status-tab" data-status="Reading">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Reading
        <span class="tab-count" id="summary-reading">0</span>
      </button>
      <button type="button" class="status-tab" data-status="TBR">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        TBR
        <span class="tab-count" id="summary-tbr">0</span>
      </button>
      <button type="button" class="status-tab" data-status="Finished">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Finished
        <span class="tab-count" id="summary-finished">0</span>
      </button>
      <button type="button" class="status-tab" data-status="DNF">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        DNF
        <span class="tab-count" id="summary-dnf">0</span>
      </button>
    </nav>

    <div class="message" id="message" role="alert" hidden></div>

    <section class="library-grid" id="library-grid">
      <!-- Items rendered by JS -->
    </section>
  </main>

  <!-- Add/Edit modal -->
  <div class="modal" id="modal-form" hidden>
    <div class="modal-content">
      <h2 id="modal-title">Add library item</h2>
      <form id="item-form">
        <input type="hidden" id="item-id" />
        <div class="form-group">
          <label for="item-title">Title <span class="required">*</span></label>
          <input type="text" id="item-title" class="input" required />
          <span class="error" id="error-title"></span>
        </div>
        <div class="form-group">
          <label for="item-author">Author</label>
          <input type="text" id="item-author" class="input" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="item-format">Format</label>
            <select id="item-format" class="select">
              <option value="Physical">Physical</option>
              <option value="Audiobook">Audiobook</option>
              <option value="Series (Chapter Based)">Series (Chapter Based)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="item-status">Status</label>
            <select id="item-status" class="select">
              <option value="TBR">TBR</option>
              <option value="Reading">Reading</option>
              <option value="Finished">Finished</option>
              <option value="DNF">DNF</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="item-genre">Genre</label>
          <input type="text" id="item-genre" class="input" list="item-genre-suggestions" placeholder="e.g. Fiction, Sci-Fi" />
          <datalist id="item-genre-suggestions"></datalist>
          <div class="genre-tags" id="item-genre-tags" aria-label="Suggested genres"></div>
        </div>
        <input type="hidden" id="item-progress-type" value="Pages" />
        <div class="form-row" id="progress-pages-chapters">
          <div class="form-group">
            <label for="item-progress-current" id="label-progress-current">Current Page</label>
            <input type="number" id="item-progress-current" class="input" min="0" step="1" />
          </div>
          <div class="form-group">
            <label for="item-progress-total" id="label-progress-total">Total Pages</label>
            <input type="number" id="item-progress-total" class="input" min="0" step="1" />
          </div>
        </div>
        <p class="form-hint" id="time-hint" hidden>Enter time in minutes (90m = 1h 30m)</p>
        <div class="form-group">
          <label for="item-notes">Notes</label>
          <textarea id="item-notes" class="textarea" rows="2"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancel-form">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
